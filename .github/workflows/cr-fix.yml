# Triggers cr-agent fix cycle when CodeRabbit submits a review.
name: CR Fix Trigger
on:
  pull_request_review:
    types: [submitted]
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: looselyorganized/cr-agent/action/cr-fix-trigger@main
        with:
          cr-agent-url: ${{ secrets.CR_AGENT_URL }}
          cr-webhook-secret: ${{ secrets.CR_WEBHOOK_SECRET }}
