name: CR Fix Trigger
description: >
  Triggers a cr-agent fix cycle when CodeRabbit submits a pull request review.
  POSTs PR metadata to the cr-agent webhook endpoint.

inputs:
  cr-agent-url:
    description: cr-agent webhook URL (e.g. https://cr-agent.up.railway.app/webhook)
    required: true
  cr-webhook-secret:
    description: Shared secret for webhook authentication
    required: true

runs:
  using: composite
  steps:
    - name: Check review author
      id: check-author
      shell: bash
      env:
        REVIEW_AUTHOR: ${{ github.event.review.user.login }}
      run: |
        # REQ-T02: skip if the review author is not coderabbitai[bot]
        if [[ "$REVIEW_AUTHOR" != "coderabbitai[bot]" ]]; then
          echo "Review author is '$REVIEW_AUTHOR', not coderabbitai[bot]. Skipping."
          echo "skip=true" >> "$GITHUB_OUTPUT"
        else
          echo "Review author is coderabbitai[bot]. Proceeding."
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: POST to cr-agent webhook
      if: steps.check-author.outputs.skip == 'false'
      shell: bash
      env:
        CR_AGENT_URL: ${{ inputs.cr-agent-url }}
        CR_WEBHOOK_SECRET: ${{ inputs.cr-webhook-secret }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        PR_BASE: ${{ github.event.pull_request.base.ref }}
        REPO: ${{ github.repository }}
        ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail

        PAYLOAD=$(jq -n \
          --arg repo   "$REPO" \
          --arg pr_num  "$PR_NUMBER" \
          --arg pr_url  "$PR_URL" \
          --arg branch  "$PR_BRANCH" \
          --arg base    "$PR_BASE" \
          --arg actor   "$ACTOR" \
          '{
            repo:        $repo,
            pr_number:   ($pr_num | tonumber),
            pr_url:      $pr_url,
            branch:      $branch,
            base_branch: $base,
            actor:       $actor
          }')

        RESP=$(curl -s -w "\n%{http_code}" -X POST \
          "${CR_AGENT_URL}" \
          -H "Authorization: Bearer ${CR_WEBHOOK_SECRET}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")

        HTTP_CODE=$(echo "$RESP" | tail -1)
        BODY=$(echo "$RESP" | sed '$d')

        echo "Response (HTTP ${HTTP_CODE}): ${BODY}"

        if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
          echo "::error::Webhook request failed (HTTP ${HTTP_CODE}): ${BODY}"
          exit 1
        fi

        ACTION=$(echo "$BODY" | jq -r '.action // "unknown"')
        echo "Webhook result: ${ACTION}"
